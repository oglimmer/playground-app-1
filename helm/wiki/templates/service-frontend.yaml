apiVersion: v1
kind: Service
metadata:
  name: {{ include "wiki.frontend.fullname" . }}
  labels:
    {{- include "wiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "wiki.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.frontendPort }}
      targetPort: http
