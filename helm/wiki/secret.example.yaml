# EXAMPLE ONLY — do not commit real secrets. The chart never creates a Secret.
# In production use a SealedSecret (helm/argocd/) or an external secret manager.
#
# Create the live secret out-of-band, e.g.:
#   kubectl -n wiki create secret generic wiki-secret \
#     --from-literal=POSTGRES_PASSWORD='change-me' \
#     --from-literal=OIDC_CLIENT_SECRET='keycloak-client-secret'
apiVersion: v1
kind: Secret
metadata:
  name: wiki-secret        # must match `existingSecret` or "<release>-wiki-secret"
  namespace: wiki
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me"
  OIDC_CLIENT_SECRET: "keycloak-client-secret"
