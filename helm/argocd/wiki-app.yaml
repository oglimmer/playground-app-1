# ArgoCD Application — syncs the Helm chart from this repo.
# Apply with: kubectl apply -f helm/argocd/wiki-app.yaml
#
# The Secret (POSTGRES_PASSWORD, OIDC_CLIENT_SECRET) is managed separately — as a
# SealedSecret or external secret — so rotating it needs no chart change.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wiki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/oglimmer/playground-app-1.git
    targetRevision: master
    path: helm/wiki
    helm:
      valuesObject:
        ingress:
          host: wiki.oglimmer.com
        oidc:
          issuerUri: https://id.oglimmer.de/realms/oglimmer
          clientId: playground-app-1
        # Continuous deploy: prod tracks the mutable :latest tag. build.yml pushes
        # :latest on every push to master and does a `kubectl rollout restart`
        # (pullPolicy: Always) to pull it. ArgoCD keeps the manifests in sync but
        # does NOT drive image rollouts here — the tag string never changes.
        backend:
          image:
            tag: "latest"
        frontend:
          image:
            tag: "latest"
  destination:
    server: https://kubernetes.default.svc
    namespace: wiki
  # build.yml's rollout restart stamps spec.template.metadata.annotations
  # "kubectl.kubernetes.io/restartedAt". That's not in the rendered chart, so
  # selfHeal would otherwise revert it and fight the restart — ignore it.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - '.spec.template.metadata.annotations."kubectl.kubernetes.io/restartedAt"'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
