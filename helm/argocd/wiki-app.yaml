# ArgoCD Application — syncs the Helm chart from this repo.
# Apply with: kubectl apply -f helm/argocd/wiki-app.yaml
#
# The Secret (POSTGRES_PASSWORD, OIDC_CLIENT_SECRET) is managed separately — as a
# SealedSecret or external secret — so rotating it needs no chart change.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wiki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # argocd-image-updater: polls ghcr for the digest behind :latest and pins it
    # into the app (argocd write-back -> spec.source.helm.parameters), triggering a
    # sync + rollout. Immutable, traceable, rollback-able. The pinned param
    # overrides the valuesObject tag below.
    # NOTE: this chart uses NESTED per-component image values (backend.image.*),
    # not image-updater's default image.name/image.tag — hence the explicit
    # helm.image-name / helm.image-tag mappings per alias.
    # If the ghcr packages are private, add e.g.
    #   argocd-image-updater.argoproj.io/backend.pull-secret: pullsecret:argocd/ghcr
    argocd-image-updater.argoproj.io/image-list: "backend=ghcr.io/oglimmer/wiki-backend:latest,frontend=ghcr.io/oglimmer/wiki-frontend:latest"
    argocd-image-updater.argoproj.io/backend.update-strategy: digest
    argocd-image-updater.argoproj.io/backend.helm.image-name: backend.image.repository
    argocd-image-updater.argoproj.io/backend.helm.image-tag: backend.image.tag
    argocd-image-updater.argoproj.io/frontend.update-strategy: digest
    argocd-image-updater.argoproj.io/frontend.helm.image-name: frontend.image.repository
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: frontend.image.tag
spec:
  project: default
  source:
    repoURL: https://github.com/oglimmer/playground-app-1.git
    targetRevision: master
    path: helm/wiki
    helm:
      valuesObject:
        ingress:
          host: wiki.oglimmer.com
        oidc:
          issuerUri: https://id.oglimmer.de/realms/oglimmer
          clientId: playground-app-1
        # Initial tag before image-updater pins a digest. image-updater writes a
        # helm parameter (backend.image.tag=latest@sha256:…) that overrides this.
        # build.yml still pushes :latest + rollout-restarts as a fast fallback until
        # image-updater is verified; once it is, the restart hook can be dropped.
        backend:
          image:
            tag: "latest"
        frontend:
          image:
            tag: "latest"
  destination:
    server: https://kubernetes.default.svc
    namespace: wiki
  # build.yml's rollout restart stamps spec.template.metadata.annotations
  # "kubectl.kubernetes.io/restartedAt". That's not in the rendered chart, so
  # selfHeal would otherwise revert it and fight the restart — ignore it.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jqPathExpressions:
        - '.spec.template.metadata.annotations."kubectl.kubernetes.io/restartedAt"'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
