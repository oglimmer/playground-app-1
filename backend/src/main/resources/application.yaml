server:
  port: 8080
  servlet:
    context-path: /api
    session:
      timeout: 30d
      cookie:
        max-age: 30d
        http-only: true
        same-site: lax
  forward-headers-strategy: framework

spring:
  application:
    name: wiki
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/wiki}"
    username: "${DB_USERNAME:wiki}"
    password: "${DB_PASSWORD:wiki}"
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: "${OIDC_CLIENT_ID:wiki-app}"
            client-secret: "${OIDC_CLIENT_SECRET:wiki-app-secret}"
            authorization-grant-type: authorization_code
            scope: openid,profile,email
            provider: keycloak
        provider:
          keycloak:
            issuer-uri: "${OIDC_ISSUER_URI:http://localhost:8081/realms/wiki}"
            user-name-attribute: preferred_username

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.oglimmer.wiki: INFO
