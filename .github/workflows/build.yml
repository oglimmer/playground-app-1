# build.yml — CI-gated build & push. Rollout is NOT done here.
# Runner: arc-playground-app-1 (in-cluster ARC scale set, arm64 + dind — no hosted minutes).
# Trigger: push to master + manual. Images: ghcr.io/oglimmer/wiki-{backend,frontend}.
# The `test` job runs the full ci.yml suite via workflow_call; the build jobs
# `needs:` it, so a red build blocks the push (dependents are skipped).
# This workflow only builds/pushes :latest (--no-restart). Deployment is owned by
# argocd-image-updater: it polls ghcr, pins the new :latest digest into the wiki
# ArgoCD app, and ArgoCD rolls it out. See helm/argocd/wiki-app.yaml.
# --platform auto = plain docker build/push (buildx's docker-container driver
# loses its push session against the registry ingress).
name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'
            frontend:
              - 'frontend/**'
              - 'oglimmer.sh'
              - '.github/workflows/build.yml'

  # Pre-deploy quality gate: full lint/typecheck/test/build suite. The build jobs
  # depend on this, so deploy only happens on green. Cheap when nothing relevant
  # changed — ci.yml's own path filter skips its component jobs.
  test:
    uses: ./.github/workflows/ci.yml

  backend:
    needs: [changes, test]
    if: needs.changes.outputs.backend == 'true'
    runs-on: arc-playground-app-1
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend
        run: ./oglimmer.sh build -b --platform auto --no-restart --verbose

  frontend:
    needs: [changes, test]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: arc-playground-app-1
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push frontend
        run: ./oglimmer.sh build -f --platform auto --no-restart --verbose
